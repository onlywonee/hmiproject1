<!DOCTYPE html>
<html>
  <body>
    <div id="emoji" style="font-size:8rem">☃️</div>
    <div id="popup" hidden>
      <p>Hi,there?</p>
      <button onclick="closePopup()">I'm doing well </button
        </div>
        <script>
          setTimeout(function(){
            document.getElementById('popup').hidden=false;
          },3000);
         function closePopup(){
        document.getElementById('popup').hidden=true;
        document.getElementById('popup').textContent = "☕️"  }
        </script>
  </body>
</html>
